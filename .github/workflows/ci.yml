name: CI

on:
  push:
    branches: [main, beta, 'feature/**']
  pull_request:
    branches: [main, beta]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Paraglide messages
        run: npx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Svelte check
        run: npm run check

  lint:
    name: Lint (stylelint + eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Paraglide messages
        # Paraglide output is gitignored; lint imports from $lib/paraglide so
        # it must exist before eslint/svelte-eslint-parser can parse .svelte files.
        run: npx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Stylelint (color-no-hex)
        run: npm run lint:style

      - name: ESLint (no-hex-in-svelte)
        run: npm run lint:js

  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Paraglide messages
        # Vitest imports from $lib/paraglide; the generated output is gitignored
        # so it must be compiled before the test run resolves those imports.
        run: npx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Sync SvelteKit
        # Vite resolves tsconfig through .svelte-kit/tsconfig.json; on a fresh
        # runner it doesn't exist yet and vitest startup fails with
        # "Tsconfig not found".
        run: npx svelte-kit sync

      - name: Run tests
        run: npm test

  rust-matrix:
    name: Resolve Rust OS matrix
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.set.outputs.os }}
    steps:
      - id: set
        shell: bash
        # Full 3-OS matrix only on pushes to beta/main (where platform bugs
        # must be caught before release). feature/** pushes and PRs stay
        # ubuntu-only so day-to-day iteration is cheap. Pass the context
        # through env vars (not inline interpolation) so a branch name with
        # shell metacharacters can't be injected into the test.
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          if [[ "$EVENT_NAME" == "push" \
                && ( "$REF" == "refs/heads/beta" || "$REF" == "refs/heads/main" ) ]]; then
            echo 'os=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

  rust-checks:
    name: Rust checks (${{ matrix.os }})
    needs: rust-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.rust-matrix.outputs.os) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies (Linux)
        # Webkit/appindicator/rsvg are needed to build the Tauri (`beardgit`)
        # crate that `cargo test --workspace` pulls in. Only Linux needs them;
        # macOS (WKWebView) and Windows (WebView2) ship the webview with the OS.
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        # Needed because the Tauri build script (invoked by cargo clippy /
        # cargo test on the beardgit crate) compiles the frontend and resolves
        # externalBin paths. Without node_modules the build fails before
        # reaching clippy. Matches the setup in build.yml / release.yml.
        run: npm ci

      - name: Resolve CLI sidecar target triple
        id: triple
        shell: bash
        # Per-host triple so the sidecar filenames match what the Tauri build
        # script expects on each runner (mirrors build.yml's matrix triples).
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)  echo "triple=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ;;
            windows-latest) echo "triple=x86_64-pc-windows-msvc"   >> "$GITHUB_OUTPUT" ;;
            macos-latest)   echo "triple=aarch64-apple-darwin"     >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unmapped runner os '${{ matrix.os }}'"; exit 1 ;;
          esac

      - name: Download CLI binaries
        # Phase 7.2 — the Tauri build script validates `externalBin` sidecar
        # paths declared in tauri.conf.json. If the binaries aren't on disk,
        # the build fails with "resource path doesn't exist" before clippy
        # / tests can run.
        run: node scripts/download-cli-binaries.js --target ${{ steps.triple.outputs.triple }}

      - name: Check formatting
        # Formatting/lint are platform-independent — run them once on Linux.
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: Trait-crate purity guard
        # Phase 9.3 — the `provider` and `forge-provider` crates define the
        # public trait contract for CI/forge backends. They must stay free of
        # runtime dependencies (no `reqwest`, `tokio` runtime hooks, `tauri`,
        # `hyper`). Fail the build if any of those imports leak in. Linux-only:
        # `grep -rnE` isn't portable to the Windows shell.
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          if grep -rnE '^[[:space:]]*(use|extern crate)[[:space:]]+(reqwest|tokio|tauri|hyper)\b' \
                crates/provider/src crates/forge-provider/src crates/ai-provider/src; then
            echo "::error::Forbidden runtime dependency imported in a trait crate." >&2
            exit 1
          fi
          echo "OK: trait crates are runtime-dep free."

      - name: Clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace
