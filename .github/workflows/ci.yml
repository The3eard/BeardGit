name: CI

on:
  push:
    branches: [main, beta, 'feature/**']
  pull_request:
    branches: [main, beta]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Paraglide messages
        run: npx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Svelte check
        run: npm run check

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        # Needed because the Tauri build script (invoked by cargo clippy /
        # cargo test on the beardgit crate) compiles the frontend and resolves
        # externalBin paths. Without node_modules the build fails before
        # reaching clippy. Matches the setup in build.yml / release.yml.
        run: npm ci

      - name: Download CLI binaries
        # Phase 7.2 — the Tauri build script validates `externalBin` sidecar
        # paths declared in tauri.conf.json. If the binaries aren't on disk,
        # the build fails with "resource path doesn't exist" before clippy
        # / tests can run. Download the Linux x64 binaries for CI's ubuntu
        # runner; production builds download per-matrix in build.yml.
        run: node scripts/download-cli-binaries.js --target x86_64-unknown-linux-gnu

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Trait-crate purity guard
        # Phase 9.3 — the `provider` and `forge-provider` crates define the
        # public trait contract for CI/forge backends. They must stay free of
        # runtime dependencies (no `reqwest`, `tokio` runtime hooks, `tauri`,
        # `hyper`). Fail the build if any of those imports leak in.
        run: |
          set -euo pipefail
          if grep -rnE '^[[:space:]]*(use|extern crate)[[:space:]]+(reqwest|tokio|tauri|hyper)\b' \
                crates/provider/src crates/forge-provider/src crates/ai-provider/src; then
            echo "::error::Forbidden runtime dependency imported in a trait crate." >&2
            exit 1
          fi
          echo "OK: trait crates are runtime-dep free."

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-22.04
    needs: [frontend-checks, rust-checks]
    # Phase 7.4 — only run on main/beta pushes and PRs targeting those, to
    # keep the heavy xvfb/tauri-driver job scoped to integration branches
    # (matches the project's main/beta-only CI/build discipline).
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')) ||
      (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'beta'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Download CLI binaries
        # Tauri build script validates bundled sidecar paths; matches rust-checks.
        run: node scripts/download-cli-binaries.js --target x86_64-unknown-linux-gnu

      - name: Install WebKit WebDriver
        # tauri-driver proxies to WebKitWebDriver on Linux; the binary
        # ships with the webkit2gtk-driver package, not webkit2gtk-4.1-dev
        # itself.
        run: sudo apt-get install -y webkit2gtk-driver

      - name: Generate Paraglide messages
        run: npx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide

      - name: Build Tauri app (debug via tauri CLI + E2E hooks)
        # `tauri build --debug --no-bundle` runs the full production
        # asset pipeline (beforeBuildCommand + tauri-build asset
        # embedding) but keeps cargo's debug profile for speed.
        # VITE_BEARDGIT_E2E=true exposes the window.__E2E__ surface
        # used by e2e/helpers/project.ts. Plain `cargo build` + `npm
        # run build` leaves the webview pointing at devUrl (Vite dev
        # server) and shows "Connection refused".
        run: VITE_BEARDGIT_E2E=true npx tauri build --debug --no-bundle

      - name: Start Xvfb + tauri-driver
        # Tauri's GTK/WebKit app needs DISPLAY set at spawn time — when
        # tauri-driver forks WebKitWebDriver and then the app binary, it
        # inherits the parent's env. Wrapping only `wdio run` in
        # xvfb-run is too late: the app is spawned by a process chain
        # started before that. Bring Xvfb up manually, export DISPLAY,
        # then start tauri-driver so both it and its children see it.
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset > /tmp/xvfb.log 2>&1 &
          echo "XVFB_PID=$!" >> "$GITHUB_ENV"
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          export DISPLAY=:99
          sleep 1
          tauri-driver > tauri-driver.log 2>&1 &
          echo "TAURI_DRIVER_PID=$!" >> "$GITHUB_ENV"
          sleep 2

      - name: Run E2E tests
        run: npx wdio run e2e/wdio.conf.ts
        env:
          CI: true
          BEARDGIT_BUILD_TYPE: debug

      - name: Stop Xvfb + tauri-driver
        if: always()
        run: |
          if [ -n "${TAURI_DRIVER_PID:-}" ]; then
            kill "$TAURI_DRIVER_PID" || true
          fi
          if [ -n "${XVFB_PID:-}" ]; then
            kill "$XVFB_PID" || true
          fi
          echo "---- tauri-driver.log ----"
          cat tauri-driver.log || true

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e/results/
          retention-days: 7
          if-no-files-found: ignore
