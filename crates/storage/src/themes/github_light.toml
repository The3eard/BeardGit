[meta]
id = "github-light"
name = "GitHub Light"
mode = "light"
complementary = "github-dark"

[colors]
background = "#ffffff"
foreground = "#1f2328"
black = "#24292f"
red = "#cf222e"
green = "#116329"
yellow = "#4d2d00"
blue = "#0969da"
magenta = "#8250df"
cyan = "#1b7c83"
white = "#6e7781"
bright-black = "#57606a"
bright-red = "#a40e26"
bright-green = "#1a7f37"
bright-yellow = "#633c01"
bright-blue = "#218bff"
bright-magenta = "#a475f9"
bright-cyan = "#3192aa"
bright-white = "#8c959f"

# Pin the authentic GitHub Light editor scheme — see github_dark.toml.
[editor]
added-bg = "#d4f8db"
removed-bg = "#fdd8d8"
syntax-keyword = "#cf222e"
syntax-string = "#0a3069"
syntax-function = "#8250df"
syntax-type = "#0550ae"
syntax-number = "#0550ae"
syntax-operator = "#cf222e"
syntax-property = "#116329"
