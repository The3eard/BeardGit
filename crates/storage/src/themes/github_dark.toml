[meta]
id = "github-dark"
name = "GitHub Dark"
mode = "dark"

[colors]
bg-primary = "#0d1117"
bg-secondary = "#161b22"
bg-toolbar = "#1c2128"
text-primary = "#e6edf3"
text-secondary = "#8b949e"
accent-blue = "#58a6ff"
accent-green = "#3fb950"
accent-orange = "#f0883e"
accent-purple = "#bc8cff"
accent-red = "#f85149"
border = "#30363d"
selection = "#1f6feb33"

[graph]
lane-colors = [
    "#58a6ff",
    "#3fb950",
    "#f0883e",
    "#bc8cff",
    "#f85149",
    "#79c0ff",
    "#56d364",
    "#d29922",
    "#d2a8ff",
    "#ff7b72",
]
background = "#0d1117"
foreground = "#e6edf3"
text-primary = "#e6edf3"
text-secondary = "#8b949e"
text-sha = "#58a6ff"
selection = "#1f6feb44"
head-lane-tint = "#58a6ff22"
selection-highlight = "#1f6feb66"
dim-opacity = 0.4
node-radius = 4.0
merge-radius = 3.0
ref-branch = "#3fb950"
ref-remote = "#58a6ff"
ref-tag = "#f0883e"
ref-head = "#bc8cff"
