[meta]
id = "beardgit-dark"
name = "BeardGit Dark"
mode = "dark"
complementary = "beardgit-light"

# BeardGit's signature theme — warm charcoal surfaces with a copper
# primary accent. Deliberately warmer than the GitHub palette so the
# app reads as its own product, not a fork.

[colors]
background = "#15110d"
foreground = "#ede5d8"
black = "#4a4238"
red = "#e0604c"
green = "#8fbc62"
yellow = "#e0a458"
blue = "#6fb1cc"
magenta = "#c78bb0"
cyan = "#7cc7b8"
white = "#cbc1b2"
bright-black = "#9a8f7d"
bright-red = "#f08573"
bright-green = "#abd084"
bright-yellow = "#f0bd72"
bright-blue = "#92c9e0"
bright-magenta = "#dcabc9"
bright-cyan = "#9cd9cc"
bright-white = "#f7f1e6"

[accents]
primary = "#d9924f"
secondary = "cyan"
tertiary = "green"
